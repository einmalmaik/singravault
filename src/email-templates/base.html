<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
    <style>
        body,table,td{margin:0;padding:0}
        img{border:0;display:block}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;line-height:1.6;color:#1a2332;background-color:#ffffff}
        .wrapper{max-width:600px;margin:0 auto;padding:40px 20px}
        .card{background:#ffffff;border-radius:16px;box-shadow:0 4px 32px rgba(10,22,40,0.12);overflow:hidden;border:1px solid #e2e8f0}
        .header{background:linear-gradient(135deg,#0a1628 0%,#0f1f38 100%);padding:32px;text-align:center}
        .logo{display:inline-flex;align-items:center;gap:14px;color:#7ec8d9;font-size:22px;font-weight:700;text-decoration:none;letter-spacing:0.5px}
        .logo img{width:44px;height:44px;border-radius:10px}
        .content{padding:40px 32px}
        h1{margin:0 0 16px;font-size:22px;font-weight:700;color:#0f1f38}
        p{margin:0 0 16px;color:#4a5568;font-size:15px}
        .btn{display:inline-block;padding:14px 32px;margin:24px 0;background:linear-gradient(135deg,#0f1f38 0%,#1a3a5c 100%);color:#7ec8d9 !important;text-decoration:none;font-weight:600;font-size:15px;border-radius:10px;border:1px solid #7ec8d9;letter-spacing:0.3px}
        .code-box{text-align:center;margin:28px 0}
        .code-box-inner{display:inline-block;background:#0f1f38;padding:18px 36px;border-radius:12px;border:2px solid #7ec8d9;letter-spacing:6px;font-size:32px;font-weight:700;color:#7ec8d9;font-family:'Courier New',Courier,monospace}
        .info-box{background:#f0f7fa;border:1px solid #b8e0ea;border-radius:10px;padding:16px 20px;margin:20px 0}
        .info-box p{color:#1a3a5c;margin:0;font-size:14px}
        .warning-box{background:#fef9e7;border:1px solid #f5d060;border-radius:10px;padding:16px 20px;margin:20px 0}
        .warning-box p{color:#7a5d00;margin:0;font-size:14px}
        .divider{height:1px;background:#e2e8f0;margin:24px 0}
        .note{font-size:13px;color:#718096}
        .footer{padding:24px 32px;background:#f7fafc;text-align:center;font-size:12px;color:#718096;border-top:1px solid #e2e8f0}
        .footer a{color:#4a9bad;text-decoration:none}
        .footer p{margin:0 0 8px;color:#718096;font-size:12px}

        @media (prefers-color-scheme: dark) {
            body{background-color:#0a1628;color:#e2e8f0}
            .card{background:#111c2e;border-color:#1e3a5f;box-shadow:0 4px 32px rgba(0,0,0,0.3)}
            h1{color:#e2e8f0}
            p{color:#a0aec0}
            .info-box{background:#0f1f38;border-color:#1e3a5f}
            .info-box p{color:#7ec8d9}
            .footer{background:#0a1628;border-color:#1e3a5f}
            .footer p{color:#718096}
            .note{color:#718096}
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <a href="https://singrapw.mauntingstudios.de" class="logo">
                    <img src="https://singrapw.mauntingstudios.de/singra-icon.png" alt="Singra Vault" width="44" height="44" style="width:44px;height:44px;border-radius:10px">
                    <span>Singra Vault</span>
                </a>
            </div>

            <div class="content">
                {{content}}
            </div>

            <div class="footer">
                <p>&copy; 2026 Singra Vault. Alle Rechte vorbehalten.</p>
                <p>
                    <a href="https://singrapw.mauntingstudios.de/privacy">Datenschutz</a> &nbsp;|&nbsp;
                    <a href="https://singrapw.mauntingstudios.de/terms">AGB</a> &nbsp;|&nbsp;
                    <a href="https://singrapw.mauntingstudios.de/support">Support</a>
                </p>
                <p class="note">
                    Diese E-Mail wurde automatisch gesendet. Bitte antworte nicht direkt auf diese Nachricht.
                </p>
            </div>
        </div>
    </div>
</body>

</html>
