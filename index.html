<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <script>
    // Early Tauri OAuth bounce. This must run before React/Supabase so the
    // browser does not consume the callback that belongs to the desktop app.
    (function () {
      try {
        var currentUrl = new URL(window.location.href);
        var source = currentUrl.searchParams.get("source");
        var redirect = currentUrl.searchParams.get("redirect") || "";
        var isTauriBounce = source === "tauri" || redirect.indexOf("source=tauri") !== -1;
        if (!isTauriBounce) return;

        var params = new URLSearchParams(currentUrl.search);
        var hash = currentUrl.hash && currentUrl.hash.charAt(0) === "#"
          ? currentUrl.hash.slice(1)
          : currentUrl.hash;
        if (hash) {
          new URLSearchParams(hash).forEach(function (value, key) {
            params.set(key, value);
          });
        }

        var hasPayload = ["access_token", "refresh_token", "code", "error", "error_code", "error_description"].some(function (key) {
          return params.has(key);
        });
        if (!hasPayload) return;

        var appUrl = "singravault://auth/callback?" + params.toString();
        window.__SINGRA_TAURI_OAUTH_BOUNCE__ = true;
        sessionStorage.setItem("singra_tauri_oauth_callback", appUrl);

        var safeAppUrl = appUrl
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;");
        var bounceDocument = [
          '<!doctype html>',
          '<html lang="de">',
          '<head>',
          '<meta charset="UTF-8" />',
          '<meta name="viewport" content="width=device-width, initial-scale=1.0" />',
          '<title>Singra Vault</title>',
          '<style>',
          ':root{--background:206 31% 4%;--foreground:188 29% 95%;--primary:193 45% 86%;--primary-foreground:195 43% 5%;--muted-foreground:196 19% 67%;--border:198 22% 26%;}',
          '*{box-sizing:border-box}',
          'body{min-height:100vh;margin:0;display:grid;place-items:center;background:hsl(var(--background));color:hsl(var(--foreground));font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center;}',
          'main{width:min(100% - 40px,360px);display:grid;gap:20px;justify-items:center;}',
          'img{width:64px;height:64px;border-radius:8px;box-shadow:0 18px 48px rgb(0 0 0 / .38)}',
          'h1{margin:0;font-size:22px;line-height:1.2;font-weight:700}',
          'p{margin:0;color:hsl(var(--muted-foreground));font-size:14px;line-height:1.6}',
          'a{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 18px;border-radius:8px;background:hsl(var(--primary));color:hsl(var(--primary-foreground));font-size:14px;font-weight:700;text-decoration:none}',
          '.spinner{width:26px;height:26px;border:3px solid hsl(var(--border));border-top-color:hsl(var(--primary));border-radius:999px;animation:spin 900ms linear infinite}',
          '@keyframes spin{to{transform:rotate(360deg)}}',
          '</style>',
          '</head>',
          '<body>',
          '<main>',
          '<img src="/singra-icon.png" alt="" />',
          '<div class="spinner" aria-hidden="true"></div>',
          '<h1>Verbindung mit Singra Vault</h1>',
          '<p>Die Desktop-App wird geöffnet. Bitte bestätige die Browser-Abfrage.</p>',
          '<a href="' + safeAppUrl + '">App öffnen</a>',
          '</main>',
          '</body>',
          '</html>',
        ].join('');

        document.open();
        document.write(bounceDocument);
        document.close();
        setTimeout(function () {
          window.location.href = appUrl;
        }, 100);
      } catch (_) {
        // React fallback handles malformed callback URLs.
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Singra Vault Passwort Manager - Sicherer Zero-Knowledge Passwort-Manager</title>
