<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <script>
    // Early Tauri OAuth bounce. This must run before React/Supabase so the
    // browser does not consume the callback that belongs to the desktop app.
    (function () {
      try {
        var currentUrl = new URL(window.location.href);
        var source = currentUrl.searchParams.get("source");
        var redirect = currentUrl.searchParams.get("redirect") || "";
        var isTauriBounce = source === "tauri" || redirect.indexOf("source=tauri") !== -1;
        if (!isTauriBounce) return;

        var params = new URLSearchParams(currentUrl.search);
        var hash = currentUrl.hash && currentUrl.hash.charAt(0) === "#"
          ? currentUrl.hash.slice(1)
          : currentUrl.hash;
        if (hash) {
          new URLSearchParams(hash).forEach(function (value, key) {
            params.set(key, value);
          });
        }

        var hasPayload = ["access_token", "refresh_token", "code", "error", "error_code", "error_description"].some(function (key) {
          return params.has(key);
        });
        if (!hasPayload) return;

        var appUrl = "singravault://auth/callback?" + params.toString();
        window.__SINGRA_TAURI_OAUTH_BOUNCE__ = true;
        sessionStorage.setItem("singra_tauri_oauth_callback", appUrl);

        document.documentElement.setAttribute("data-tauri-oauth-bounce", "true");
        window.__SINGRA_TAURI_OAUTH_URL__ = appUrl;

        var wireBounce = function () {
          var openButton = document.getElementById("singra-open-app");
          var callbackField = document.getElementById("singra-callback-url");
          var copyButton = document.getElementById("singra-copy-link");

          if (openButton) openButton.setAttribute("href", appUrl);
          if (callbackField) callbackField.value = appUrl;
          if (copyButton && callbackField) {
            copyButton.addEventListener("click", function () {
              var done = function () { copyButton.textContent = "Anmelde-Link kopiert"; };
              if (navigator.clipboard) {
                navigator.clipboard.writeText(appUrl).then(done).catch(function () {
                  callbackField.select();
                });
              } else {
                callbackField.select();
              }
            });
          }
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", wireBounce, { once: true });
        } else {
          wireBounce();
        }

        setTimeout(function () {
          window.location.assign(appUrl);
        }, 300);
      } catch (_) {
        // React fallback handles malformed callback URLs.
      }
    })();
  </script>

  <style>
    #tauri-oauth-bounce {
      display: none;
    }

    html[data-tauri-oauth-bounce="true"] body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 50% 10%, hsl(193 45% 86% / 0.10), transparent 34rem),
        hsl(206 31% 4%);
      color: hsl(188 29% 95%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-tauri-oauth-bounce="true"] #root {
      display: none;
    }

    html[data-tauri-oauth-bounce="true"] #tauri-oauth-bounce {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .oauth-bounce__content {
      width: min(100%, 420px);
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    .oauth-bounce__logo {
      width: 72px;
      height: 72px;
      border-radius: 8px;
      box-shadow: 0 18px 48px rgb(0 0 0 / 0.38);
    }

    .oauth-bounce__spinner {
      width: 28px;
      height: 28px;
      border: 3px solid hsl(198 22% 26%);
      border-top-color: hsl(193 45% 86%);
      border-radius: 999px;
      animation: oauth-bounce-spin 900ms linear infinite;
    }

    .oauth-bounce__title {
      margin: 0;
      font-size: clamp(1.35rem, 1rem + 1vw, 1.75rem);
      line-height: 1.2;
      letter-spacing: 0;
    }

    .oauth-bounce__text {
      margin: 0;
      color: hsl(196 19% 67%);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .oauth-bounce__actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .oauth-bounce__button {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid hsl(198 22% 26%);
      border-radius: 8px;
      padding: 0 18px;
      background: hsl(193 45% 86%);
      color: hsl(195 43% 5%);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .oauth-bounce__button--secondary {
      background: hsl(198 30% 12%);
      color: hsl(188 29% 95%);
    }

    .oauth-bounce__manual {
      width: 100%;
      color: hsl(196 19% 67%);
      font-size: 0.85rem;
    }

    .oauth-bounce__manual summary {
      cursor: pointer;
    }

    .oauth-bounce__manual textarea {
      width: 100%;
      min-height: 74px;
      margin-top: 10px;
      border: 1px solid hsl(198 22% 26%);
      border-radius: 8px;
      padding: 10px;
      background: hsl(204 25% 10%);
      color: hsl(188 29% 95%);
      font: 0.78rem ui-monospace, SFMono-Regular, Consolas, monospace;
      resize: vertical;
    }

    @keyframes oauth-bounce-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="apple-touch-icon" sizes="180x180" href="/pwa-192.png" />

<body>
  <div id="root"></div>
  <main id="tauri-oauth-bounce" aria-live="polite">
    <section class="oauth-bounce__content">
      <img class="oauth-bounce__logo" src="/singra-icon.png" alt="" />
      <div class="oauth-bounce__spinner" aria-hidden="true"></div>
      <h1 class="oauth-bounce__title">Verbindung mit Singra Vault</h1>
      <p class="oauth-bounce__text">
        Die Desktop-App wird geöffnet. Bitte bestätige die Browser-Abfrage.
      </p>
      <div class="oauth-bounce__actions">
        <a id="singra-open-app" class="oauth-bounce__button" href="singravault://auth/callback">App öffnen</a>
        <button id="singra-copy-link" class="oauth-bounce__button oauth-bounce__button--secondary" type="button">
          Anmelde-Link kopieren
        </button>
      </div>
      <details class="oauth-bounce__manual">
        <summary>Manuell in der Desktop-App anmelden</summary>
        <textarea id="singra-callback-url" readonly aria-label="Anmelde-Link"></textarea>
      </details>
    </section>
  </main>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
