<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <script>
    // Early Tauri OAuth bounce. This must run before React/Supabase so the
    // browser does not consume the callback that belongs to the desktop app.
    (function () {
      try {
        var currentUrl = new URL(window.location.href);
        var source = currentUrl.searchParams.get("source");
        var redirect = currentUrl.searchParams.get("redirect") || "";
        var isTauriBounce = source === "tauri" || redirect.indexOf("source=tauri") !== -1;
        if (!isTauriBounce) return;

        var params = new URLSearchParams(currentUrl.search);
        var hash = currentUrl.hash && currentUrl.hash.charAt(0) === "#"
          ? currentUrl.hash.slice(1)
          : currentUrl.hash;
        if (hash) {
          new URLSearchParams(hash).forEach(function (value, key) {
            params.set(key, value);
          });
        }

        var hasPayload = ["access_token", "refresh_token", "code", "error", "error_code", "error_description"].some(function (key) {
          return params.has(key);
        });
        if (!hasPayload) return;

        var appUrl = "singravault://auth/callback?" + params.toString();
        window.__SINGRA_TAURI_OAUTH_BOUNCE__ = true;
        sessionStorage.setItem("singra_tauri_oauth_callback", appUrl);
        if (window.stop) window.stop();

        document.documentElement.innerHTML = '<head><title>Singra Vault</title></head><body style="background:#020617;color:white;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;text-align:center;overflow:hidden;">' +
          '<div style="padding:20px;max-width:320px;">' +
          '<img src="/singra-icon.png" alt="" style="width:64px;height:64px;border-radius:16px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.5);">' +
          '<h2 style="margin:0 0 10px 0;font-size:20px;">Verbindung mit Singra Vault...</h2>' +
          '<p style="color:#94a3b8;font-size:14px;margin-bottom:24px;">Desktop-App wird geoeffnet. Bitte bestaetige die Browser-Abfrage.</p>' +
          '<div style="margin:0 auto 24px auto;border:3px solid #1e293b;border-top-color:#6366f1;border-radius:50%;width:24px;height:24px;animation:spin 1s linear infinite;"></div>' +
          '<a id="singra-open-app" style="background:#6366f1;color:white;text-decoration:none;font-size:14px;padding:10px 20px;border-radius:8px;display:block;font-weight:600;box-shadow:0 4px 12px rgba(99,102,241,0.3);">Link manuell oeffnen</a>' +
          '</div><style>@keyframes spin { to { transform: rotate(360deg); } }</style></body>';

        document.getElementById("singra-open-app").setAttribute("href", appUrl);
        window.location.replace(appUrl);
      } catch (_) {
        // React fallback handles malformed callback URLs.
      }
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
