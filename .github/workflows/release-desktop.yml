name: release-desktop

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      VITE_SITE_URL: ${{ vars.OFFICIAL_VITE_SITE_URL }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.OFFICIAL_VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.OFFICIAL_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.OFFICIAL_VITE_SUPABASE_URL }}
      VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY: ${{ secrets.VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Checkout premium source
        uses: actions/checkout@v4
        with:
          repository: einmalmaik/singra-premium
          ref: ${{ vars.SINGRA_PREMIUM_REF || 'master' }}
          token: ${{ secrets.SINGRA_PREMIUM_PAT }}
          path: .premium-source
          persist-credentials: false

      - name: Stage premium source as sibling repository
        run: node scripts/stage-premium-source.mjs .premium-source ../singra-premium

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install core dependencies
        run: npm ci

      - name: Repository secret guardrails
        run: npm run security:repo-guard

      - name: Release artifact guardrails
        run: npm run release:check-artifacts

      - name: Validate official desktop configuration
        run: node scripts/validate-official-desktop-config.mjs

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINGRA_PREMIUM_SOURCE: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vault v__VERSION__"
          releaseBody: |
            ## Singra Vault 0.4.7

            Dieses Release fuehrt das neue Vault Operation Log als zentrale Vertrauens- und Verifikationsschicht ein. Der Offline-Modus ist dadurch robuster, aber das eigentliche Highlight ist die Umstellung vom alten Integritaets-/Snapshot-Pfad auf signierte, verifizierte Operationen.

            ### Highlights

            - Neues Vault Operation Log: Tresor-Aenderungen laufen jetzt ueber signierte Operationen statt ueber das alte Integritaets-/Snapshot-System als primaere Vertrauensbasis.
            - OpLog Verification prueft Operation-Chain, Record-Kontext, Device-Trust, Trust-Epoch und Vault-Head, bevor Eintraege normal angezeigt oder fuer Export/Suche/Zwischenablage freigegeben werden.
            - Geraetevertrauen ist sichtbarer und strenger getrennt: Device Key entsperrt lokal, Device-Signing-Key und verifizierter Trust-State autorisieren Operationen.
            - Offline-Modus baut auf dem neuen OpLog-Modell auf: Offline erstellte, bearbeitete und geloeschte Eintraege werden als signierte Operationen nach dem Reconnect verifiziert synchronisiert.
            - Sicherheitsanzeigen zeigen klarer, ob der Tresor verifiziert, eingeschraenkt, in Quarantaene, im Sicherheitsmodus oder wegen Geraetevertrauen gesperrt ist.
            - Singra Vault ist sichtbar als experimenteller Prototyp markiert. Bitte keine echten Passwoerter, produktiven Secrets oder Recovery-Daten speichern.

            ### Verbesserungen

            - Item-, Kategorie- und Delete-Flows sind an den OpLog-CRUD-Pfad angebunden und vermeiden direkte Legacy-Writes als normale Vertrauensbasis.
            - Quarantaene, Konflikte und geloeschte Eintraege werden aus dem verifizierten OpLog-UI-State abgeleitet statt aus einem ungeprueften Serverstand.
            - Restore-/Resolve-Pfade erzeugen neue signierte Operationen oder blockieren fail-closed, wenn kein verifizierter Kontext vorhanden ist.
            - Offline-Aenderungen werden als wartende Aenderungen behandelt und erst nach erfolgreicher Verifikation als synchronisiert markiert.
            - Widerrufene Geraete koennen wartende Offline-Aenderungen nicht mehr automatisch in die Cloud senden.
            - Eintraege, Kategorien und geloeschte Eintraege bleiben nach Offline-Nutzung und erneutem Online-Gehen konsistenter zwischen mehreren Geraeten.
            - Export, Suche und Zwischenablage verwenden nur verifizierte Tresor-Eintraege.

            ### Behoben

            - Frische, leere Tresore nach Social-Login/Neuregistrierung werden nicht mehr faelschlich wegen fehlendem Manifest V2 blockiert.
            - Leere, verifizierte OpLog-Tresore zeigen beim Aktualisieren nicht mehr faelschlich "Entschluessele Eintraege..." an.
            - Offline erstellte oder geloeschte Eintraege wurden in manchen Situationen nicht zuverlaessig synchronisiert.
            - Kurzzeitige Quarantaene-Anzeigen beim Laden des Sicherheitsstatus verschwinden sauberer nach erfolgreicher Verifikation.
            - Geraete-Recovery und erneutes Vertrauen eines Geraets funktionieren nach Widerruf stabiler.
            - Add-Device-Anfragen bleiben erneut versuchbar, wenn ein spaeterer Speichervorgang fehlschlaegt.

            ### Wichtige Hinweise

            - Wenn alle vertrauenswuerdigen Geraete und alle Recovery-Codes verloren sind, gibt es weiterhin keinen Support-Bypass fuer den Tresorzugriff.
            - Der oeffentliche Quellcode bleibt Core-only; offizielle Desktop-Builds werden mit vorkonfigurierter Singra Cloud gebaut.
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
