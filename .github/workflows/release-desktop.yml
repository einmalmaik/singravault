name: release-desktop

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      VITE_SITE_URL: ${{ vars.OFFICIAL_VITE_SITE_URL }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.OFFICIAL_VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.OFFICIAL_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.OFFICIAL_VITE_SUPABASE_URL }}
      VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY: ${{ secrets.VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Checkout premium source
        uses: actions/checkout@v4
        with:
          repository: einmalmaik/singra-premium
          ref: ${{ vars.SINGRA_PREMIUM_REF || 'master' }}
          token: ${{ secrets.SINGRA_PREMIUM_PAT }}
          path: .premium-source
          persist-credentials: false

      - name: Stage premium source as sibling repository
        run: node scripts/stage-premium-source.mjs .premium-source ../singra-premium

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install core dependencies
        run: npm ci

      - name: Repository secret guardrails
        run: npm run security:repo-guard

      - name: Release artifact guardrails
        run: npm run release:check-artifacts

      - name: Validate official desktop configuration
        run: node scripts/validate-official-desktop-config.mjs

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINGRA_PREMIUM_SOURCE: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vault v__VERSION__"
          releaseBody: |
            ## Singra Vault 0.4.8

            Dieses Release bringt das neue Premium-Dark-Designsystem in den Vault, überarbeitet die Vault-Liste mit Vorschau-Bereich, Tabellenansicht, Drag-and-Drop und Fokus-Highlight, fügt eine optionale Tresor-Gesundheitszusammenfassung in der Sidebar hinzu und härtet Stabilität und zentrale Crypto-Verträge ab.

            ### Highlights

            - Neues Premium-Dark-Designsystem für Login, Landing, rechtliche Unterseiten und die gesamte Vault-Oberfläche, inklusive kontrollierter Provider- und Kategorie-Icons.
            - Überarbeitete Vault-Liste mit neuem Item-Vorschau-Bereich (Schnellaktionen für Kopieren, Favorit, Bearbeiten, Löschen) und neuer Tabellenansicht inklusive klappbarer Kategorie-Abschnitte.
            - Drag-and-Drop für Einträge zwischen Kategorien und für Kategorien selbst, sowohl mit Maus als auch per Touch (langes Drücken zum Aktivieren).
            - Optionale Tresor-Gesundheitszusammenfassung in der Sidebar: schwache, pwned, doppelte, alte, wiederverwendete und starke Passwörter werden lokal ausgewertet (Premium).
            - "Have I Been Pwned"-Prüfung mit k-Anonymity über den SHA-1-Präfix; vollständige Passwörter verlassen das Gerät nicht und Ergebnisse werden pro Sitzung zwischengespeichert.
            - Singra Vault bleibt sichtbar als experimenteller Prototyp markiert. Bitte keine echten Passwörter, produktiven Secrets oder Recovery-Daten speichern.

            ### Verbesserungen

            - Beim Springen zu einem bestimmten Eintrag wird dieser jetzt scrolled-into-view und kurzzeitig hervorgehoben.
            - Toast-Benachrichtigungen lassen sich per Klick in die Zwischenablage kopieren.
            - Mobile- und Touch-UX deutlich aufgewertet: größere Tap-Ziele, kompakte Bottom-Navigation mit Safe-Area-Abstand, Dialoge nutzen die volle dynamische Viewport-Höhe, Tabs mit Scroll erhalten einen Fade-Hinweis, Favoriten als vertikales Grid auf Mobil/Tablet und horizontales Karussell auf Desktop.
            - Passwort-Stärke-Bewertung berücksichtigt zusätzlichen Nutzerkontext (Titel, Benutzername, URL), damit naheliegende Varianten korrekt schwächer bewertet werden.
            - Kategorie- und Item-Dialoge mit polierter Icon-Auswahl, Layouts und Detail-Korrekturen.

            ### Behoben

            - Leere Tresore zeigen beim ersten Laden nicht mehr fälschlich "Entschlüssele Einträge..." an.
            - Frisch erstellte Social-Login-Accounts erhalten beim Masterpasswort-Setup direkt einen initialen OpLog-Trust-State mit lokalem Device-Signing-Key, sodass neue Einträge nicht mehr wegen fehlender OpLog-Device-Identität blockieren.
            - Frische, leere OpLog-Tresore werden nach lokaler Verifikation als verifiziert behandelt, statt fälschlich in alte Manifest-/Safe-Mode-Pfade zu fallen.
            - Der Sicherheitsstatus in der Sidebar flackert nicht mehr bei jedem Hintergrund-Refresh als Ladezustand.
            - Routine-Prüfungen im gesunden Zustand schreiben keine dauerhaften Info-Logs mehr in die Konsole.
            - Passkey-Einstellungen: ein harmloser 401 während des Session-Warmups zeigt keinen Fehler-Toast mehr.

            ### Stabilität & Sicherheit

            - Vault-CRUD-Aktionen werden über eine interne Aktions-Warteschlange serialisiert; signierte Operationen laufen sequenziell ab und vermeiden OpLog-Konflikte auf langsamen Verbindungen.
            - Erweiterte Tests für die zentrale Crypto-Grenze (AES-GCM-Roundtrip für Text und Binärdaten, IV-Eindeutigkeit, Manipulationsablehnung, AAD-Bindung, Envelope-Versionierung, KDF-Parameter-Stabilität, UserKey-/Private-Key-Wrapping). Sicherheitsversprechen ändern sich dadurch nicht; bestehende Eigenschaften sind jetzt vertraglich abgesichert.

            ### Wichtige Hinweise

            - Wenn alle vertrauenswürdigen Geräte und alle Recovery-Codes verloren sind, gibt es weiterhin keinen Support-Bypass für den Tresorzugriff.
            - Der öffentliche Quellcode bleibt Core-only; offizielle Desktop-Builds werden mit vorkonfigurierter Singra Cloud gebaut.
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
