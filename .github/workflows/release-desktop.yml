name: release-desktop

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install dependencies with private premium package
        run: node scripts/install-with-optional-premium.mjs
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          INSTALL_SINGRA_PREMIUM: "true"
          SINGRA_PREMIUM_REF: ${{ vars.SINGRA_PREMIUM_REF }}

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vault v__VERSION__ Beta"
          releaseBody: |
            Beta-Release für Singra Vault Desktop.

            Wichtige Hinweise:
            - Der öffentliche Source-Code bleibt Core-only.
            - Die Desktop-Artefakte werden im CI mit dem privaten Premium-Paket gebaut.
            - Premium-Funktionen müssen weiterhin serverseitig erzwungen werden.
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          args: ${{ matrix.args }}
