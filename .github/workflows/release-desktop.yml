name: release-desktop

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      VITE_SITE_URL: ${{ vars.OFFICIAL_VITE_SITE_URL }}
      VITE_SUPABASE_PROJECT_ID: ${{ vars.OFFICIAL_VITE_SUPABASE_PROJECT_ID }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.OFFICIAL_VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_URL: ${{ vars.OFFICIAL_VITE_SUPABASE_URL }}
      VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY: ${{ secrets.VITE_OPAQUE_SERVER_STATIC_PUBLIC_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Checkout premium source
        uses: actions/checkout@v4.2.2
        with:
          repository: einmalmaik/singra-premium
          ref: ${{ vars.SINGRA_PREMIUM_REF || 'master' }}
          token: ${{ secrets.SINGRA_PREMIUM_PAT }}
          path: .premium-source
          persist-credentials: false

      - name: Stage premium source as sibling repository
        run: node scripts/stage-premium-source.mjs .premium-source ../singra-premium

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install core dependencies
        run: npm ci

      - name: Repository secret guardrails
        run: npm run security:repo-guard

      - name: Release artifact guardrails
        run: npm run release:check-artifacts

      - name: Validate official desktop configuration
        run: node scripts/validate-official-desktop-config.mjs

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SINGRA_PREMIUM_SOURCE: "true"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Singra Vault v__VERSION__"
          releaseBody: |
            ## Singra Vault 0.5.5

            Dieses Patch-Release repariert Premium-Dateianhänge für den aktuellen OpLog-Tresorpfad.

            ### Highlights

            - **Dateiuploads funktionieren wieder mit OpLog-Einträgen**: `file_attachments` akzeptiert aktive eigene `vault_records` vom Typ `item` als Upload-Ziel.
            - **Keine Legacy-Shadow-Items**: Der Fix entfernt die alte `vault_items`-only-FK-Kopplung und behält die serverseitigen Owner-, Premium-, E2EE- und Opaque-Metadata-Prüfungen bei.
            - **Keine `[object Object]`-Fehler mehr**: Premium normalisiert Supabase-/Storage-Fehler in lesbare Upload-, Download- und Delete-Meldungen.
            - **Lokal verifiziert**: Migration, Premium-Komponente, Attachment-Service, Crypto-Vertrag und Host-Build wurden gezielt geprüft.
          generateReleaseNotes: false
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
