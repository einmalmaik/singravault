name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core-build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Repository secret guardrails
        run: npm run security:repo-guard

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build core bundle
        run: npm run build:core-only
