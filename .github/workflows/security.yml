name: security

on:
  pull_request:
  push:
    branches:
      - 'feature/**'
      - 'security/**'

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Repository secret guardrails
        run: npm run security:repo-guard

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high

      - name: OSV scan
        uses: google/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --lockfile=package-lock.json

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
