<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Singra Vault - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: hsl(206 31% 4%);
        color: hsl(188 29% 95%);
      }

      main {
        max-width: 28rem;
        padding: 1.5rem;
        text-align: center;
        background: hsl(204 25% 10%);
        border: 1px solid hsl(198 22% 26%);
        border-radius: 0.75rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: hsl(196 19% 67%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>Keine Verbindung. Bitte erneut versuchen, sobald Internet verfuegbar ist.</p>
    </main>
  </body>
</html>
